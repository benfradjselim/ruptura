# Ruptura Helm chart values
# Install: helm install ruptura oci://ghcr.io/benfradjselim/charts/ruptura

replicaCount: 1

image:
  repository: docker.io/selimbf/ruptura
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: Always

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# -- API bearer token for authentication. Generate a strong random value.
# If empty, authentication is disabled (dev/testing only).
apiKey: ""

# -- When true and apiKey is empty, a one-shot Job generates a random API key
# on first install, stores it in the same Secret apiKey would use, and prints
# it in the Job's logs (kubectl logs -n <ns> job/<release>-init-apikey).
# Used by the single-manifest install path (install/ruptura.yaml); off by
# default for normal `helm install`, where setting --set apiKey=... directly
# is the documented production path.
autoGenerateApiKey: false

# -- Product edition: "community" (default) or "autopilot".
# community: action recommendations are visible (read-only); approve endpoint returns 402.
# autopilot: full Tier-1 auto-execution and manual action approval enabled.
edition: community

# -- Auto-discovery: Ruptura discovers all Deployments/StatefulSets in the cluster
# when workloads send OTLP metrics with k8s.* resource attributes.
autodiscovery:
  enabled: true

# -- ruptura-ui: separate Svelte dashboard pod (v7.0+).
# Set enabled: true to deploy the UI as a separate container with its own service.
# The UI proxies /api/ to the ruptura core engine via nginx.
ui:
  enabled: false
  image:
    repository: ghcr.io/benfradjselim/ruptura-ui
    tag: ""         # defaults to Chart.appVersion
    pullPolicy: Always
  port: 80
  service:
    type: ClusterIP
    annotations: {}
  # NodePort for the UI when service.type=NodePort
  nodePort: ""
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

ports:
  api: 8080    # REST API + Prometheus metrics
  otlp: 4317   # OTLP ingest (metrics/logs/traces)

service:
  type: ClusterIP
  annotations: {}

otlpService:
  type: NodePort
  annotations: {}

# -- NodePort for the OTLP ingest port (4317). Set to "" for auto-assignment.
otlpNodePort: 31470

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ruptura.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  existingClaim: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

# -- Go runtime memory soft limit (bytes). Set slightly below the container memory limit
# so the GC kicks in before OOMKill. Default: 400MiB.
# Use Go memory suffix strings (e.g. "400MiB", "920MiB", "1GiB") — NOT raw byte counts.
goMemLimit: "400MiB"

serviceAccount:
  create: true
  annotations: {}
  name: ""

# -- ClusterRole to read Kubernetes workload metadata (Deployments, StatefulSets, Pods).
# Required for workload auto-discovery via the Kubernetes API.
rbac:
  create: true

# -- Seconds to wait after SIGTERM before force-killing the pod.
# Must be > the server's 10 s graceful shutdown so snapshots can flush to disk.
terminationGracePeriodSeconds: 30

# -- PodDisruptionBudget prevents too many pods from being evicted at once.
# With replicaCount=1 + Recreate strategy, maxUnavailable=1 is the safe default.
# Set minAvailable: 1 only if you run replicaCount >= 2.
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1
  # minAvailable: 1

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

# -- Kafka broker list for event streaming (optional). Leave empty for in-process bus.
kafka:
  brokers: ""

# -- Ingest rate limit in requests/second (default 1000).
ingestRPS: 1000

# -- ServiceMonitor for Prometheus Operator scraping (optional).
serviceMonitor:
  enabled: false
  namespace: ""
  interval: 15s
  scrapeTimeout: 10s
  labels: {}

nodeSelector: {}
tolerations: []
affinity: {}

# -- SLO contracts for computing slo_burn_velocity (business signal).
# Each entry maps a workload to its SLO target and error budget.
# slo_burn_velocity = current_error_rate / (1 - target_percent/100)
# Values > 1.0 mean you are burning the error budget faster than allowed.
#
# Example:
# slos:
#   - workload: payments/deployment/checkout
#     targetPercent: 99.9
#     windowDays: 30
#     errorBudgetMinutes: 43.2
#   - workload: orders/deployment/api
#     targetPercent: 99.5
#     windowDays: 30
#     errorBudgetMinutes: 216
slos: []

# -- Per-workload HealthScore signal weight overrides (v6.6).
# Entries are evaluated in order; first selector match wins.
# Selector is a glob matched against the workload key (e.g. "payments/*", "batch/*").
# Omitted fields default to 0 (weights are normalised to sum to 1.0 on load).
# Example:
# workloadWeights:
#   - selector: "payments/*"
#     stress: 0.35
#     fatigue: 0.15
#     mood: 0.20
#     pressure: 0.20
#     humidity: 0.05
#     contagion: 0.05
#   - selector: "batch/*"
#     stress: 0.10
#     fatigue: 0.30
#     mood: 0.10
#     pressure: 0.10
#     humidity: 0.20
#     contagion: 0.20
workloadWeights: []
