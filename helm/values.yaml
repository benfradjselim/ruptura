# Ruptura Helm chart values
# Install: helm install ruptura oci://ghcr.io/benfradjselim/charts/ruptura

replicaCount: 1

image:
  repository: ghcr.io/benfradjselim/ruptura
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# -- API bearer token for authentication. Generate a strong random value.
# If empty, authentication is disabled (dev/testing only).
apiKey: ""

# -- Auto-discovery: Ruptura discovers all Deployments/StatefulSets in the cluster
# when workloads send OTLP metrics with k8s.* resource attributes.
autodiscovery:
  enabled: true

ports:
  api: 8080    # REST API + Prometheus metrics
  otlp: 4317   # OTLP ingest (metrics/logs/traces)

service:
  type: ClusterIP
  annotations: {}

otlpService:
  type: ClusterIP
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ruptura.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  existingClaim: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

serviceAccount:
  create: true
  annotations: {}
  name: ""

# -- ClusterRole to read Kubernetes workload metadata (Deployments, StatefulSets, Pods).
# Required for workload auto-discovery via the Kubernetes API.
rbac:
  create: true

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

# -- Kafka broker list for event streaming (optional). Leave empty for in-process bus.
kafka:
  brokers: ""

# -- Ingest rate limit in requests/second (default 1000).
ingestRPS: 1000

# -- ServiceMonitor for Prometheus Operator scraping (optional).
serviceMonitor:
  enabled: false
  namespace: ""
  interval: 15s
  scrapeTimeout: 10s
  labels: {}

nodeSelector: {}
tolerations: []
affinity: {}

# -- SLO contracts for computing slo_burn_velocity (business signal).
# Each entry maps a workload to its SLO target and error budget.
# slo_burn_velocity = current_error_rate / (1 - target_percent/100)
# Values > 1.0 mean you are burning the error budget faster than allowed.
#
# Example:
# slos:
#   - workload: payments/deployment/checkout
#     targetPercent: 99.9
#     windowDays: 30
#     errorBudgetMinutes: 43.2
#   - workload: orders/deployment/api
#     targetPercent: 99.5
#     windowDays: 30
#     errorBudgetMinutes: 216
slos: []
