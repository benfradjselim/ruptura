{{- if .Values.ui.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ruptura.fullname" . }}-ui-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ruptura.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;

        # Vite builds with base: '/ui/' so hashed assets are requested as
        # /ui/assets/…  but the Dockerfile copies them to the nginx root.
        # Alias strips the /ui prefix so assets resolve correctly.
        location ^~ /ui/ {
            alias /usr/share/nginx/html/;
        }

        # SPA catch-all: serve index.html for any path not found on disk.
        location / {
            try_files $uri /index.html;
        }
    }
{{- end }}
