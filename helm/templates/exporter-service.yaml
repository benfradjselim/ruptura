apiVersion: v1
kind: Service
metadata:
  name: exporter
  namespace: {{ .Values.namespace }}
  labels:
    app: exporter
spec:
  selector:
    app: exporter
  ports:
    - port: {{ .Values.services.exporter.port }}
      targetPort: {{ .Values.services.exporter.port }}
      protocol: TCP
      name: http
  type: ClusterIP
