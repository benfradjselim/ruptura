apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: {{ .Values.namespace }}
  labels:
    app: dashboard
spec:
  selector:
    app: dashboard
  ports:
    - port: {{ .Values.services.dashboard.port }}
      targetPort: {{ .Values.services.dashboard.port }}
      protocol: TCP
      name: http
  type: NodePort
