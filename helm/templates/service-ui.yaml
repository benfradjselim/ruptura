{{- if .Values.ui.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ruptura.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ruptura.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
  {{- with .Values.ui.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.ui.service.type }}
  selector:
    {{- include "ruptura.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ui
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
      {{- if and (eq .Values.ui.service.type "NodePort") .Values.ui.nodePort }}
      nodePort: {{ .Values.ui.nodePort }}
      {{- end }}
{{- end }}
