apiVersion: v1
kind: ServiceAccount
metadata:
  name: mlops-sa
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mlops-collector-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mlops-collector-binding
subjects:
  - kind: ServiceAccount
    name: mlops-sa
    namespace: {{ .Values.namespace }}
roleRef:
  kind: ClusterRole
  name: mlops-collector-role
  apiGroup: rbac.authorization.k8s.io
