apiVersion: v1
kind: ServiceAccount
metadata:
  name: mlops-sa
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mlops-collector-role
  namespace: {{ .Values.namespace }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mlops-collector-binding
  namespace: {{ .Values.namespace }}
subjects:
  - kind: ServiceAccount
    name: mlops-sa
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: mlops-collector-role
  apiGroup: rbac.authorization.k8s.io
