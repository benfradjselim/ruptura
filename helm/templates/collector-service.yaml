apiVersion: v1
kind: Service
metadata:
  name: collector
  namespace: {{ .Values.namespace }}
  labels:
    app: collector
spec:
  selector:
    app: collector
  ports:
    - port: {{ .Values.services.collector.port }}
      targetPort: {{ .Values.services.collector.port }}
      protocol: TCP
      name: http
  type: ClusterIP
