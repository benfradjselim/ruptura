---
# ═══════════════════════════════════════════════════════════════════════════
# Ruptura Lab — Synthetic Test Applications
# 6 microservices with distinct health profiles designed to trigger all
# Ruptura signal types: stable, degraded, memory leak, cascade failure,
# CPU spike, and brand-new (calibrating).
#
# Each app exposes /metrics (Prometheus) and /healthz, and sends OTLP
# to the otel-collector in the monitoring namespace.
# ═══════════════════════════════════════════════════════════════════════════

# ── 1. gateway — STABLE, healthy baseline ──────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: test-apps
  labels:
    app: gateway
    scenario: stable
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        workload: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: gateway
          image: ghcr.io/benfradjselim/ruptura-testapp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: APP_NAME
              value: "gateway"
            - name: SCENARIO
              value: "stable"
            - name: LATENCY_P50_MS
              value: "12"
            - name: LATENCY_P99_MS
              value: "45"
            - name: ERROR_RATE
              value: "0.001"
            - name: CPU_LOAD
              value: "0.15"
            - name: MEMORY_MB
              value: "128"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.monitoring.svc.cluster.local:4318"
            - name: OTEL_SERVICE_NAME
              value: "gateway"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "k8s.namespace.name=test-apps,k8s.deployment.name=gateway"
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 200m
              memory: 192Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: test-apps
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080

---
