---
# OpenTelemetry Collector — receives OTLP from test-apps, forwards to Ruptura
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      prometheus:
        config:
          scrape_configs:
            - job_name: kube-state-metrics
              scrape_interval: 15s
              static_configs:
                - targets: ["kube-state-metrics.monitoring.svc.cluster.local:8080"]
            - job_name: test-apps
              scrape_interval: 15s
              metrics_path: /metrics
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names: [test-apps]
              relabel_configs:
                # Only scrape pods that expose port 8080
                - source_labels: [__meta_kubernetes_pod_container_port_number]
                  regex: "8080"
                  action: keep
                # Set the job label to the pod's app label so service.name becomes the app name
                - source_labels: [__meta_kubernetes_pod_label_app]
                  target_label: job

    processors:
      batch:
        send_batch_size: 256
        timeout: 5s
      memory_limiter:
        check_interval: 1s
        limit_mib: 200
        spike_limit_mib: 50
      # Enrich with k8s metadata
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.pod.name
            - k8s.node.name
          labels:
            - tag_name: app
              key: app
              from: pod
            - tag_name: workload
              key: workload
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: net.host.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: connection

      # Copy service.name → k8s.deployment.name for test-apps pods so Ruptura
      # classifies them as Deployment workloads (not host) in the fleet view.
      transform/testapps-kind:
        error_mode: ignore
        metric_statements:
          - context: resource
            statements:
              - set(attributes["k8s.deployment.name"], attributes["service.name"])
                where IsMatch(attributes["k8s.namespace.name"], "test-apps")

    exporters:
      otlphttp/ruptura:
        # Ruptura OTLP ingest port (HTTP, not gRPC) with custom paths
        endpoint: http://ruptura.ruptura-system.svc.cluster.local:4317
        metrics_endpoint: http://ruptura.ruptura-system.svc.cluster.local:4317/otlp/v1/metrics
        logs_endpoint: http://ruptura.ruptura-system.svc.cluster.local:4317/otlp/v1/logs
        traces_endpoint: http://ruptura.ruptura-system.svc.cluster.local:4317/otlp/v1/traces
        encoding: json
        compression: none
        tls:
          insecure: true
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_elapsed_time: 30s

    service:
      pipelines:
        metrics:
          receivers: [otlp, prometheus]
          processors: [memory_limiter, k8sattributes, transform/testapps-kind, batch]
          exporters: [otlphttp/ruptura]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp/ruptura]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp/ruptura]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: otel-collector
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.100.0
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - containerPort: 4317  # OTLP gRPC
            - containerPort: 4318  # OTLP HTTP
          volumeMounts:
            - name: config
              mountPath: /etc/otel
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: monitoring
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
rules:
  - apiGroups: [""]
    resources: [pods, namespaces, nodes]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, replicasets, statefulsets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: monitoring
