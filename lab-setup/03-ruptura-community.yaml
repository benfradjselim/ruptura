---
# Ruptura Community Engine
# Secrets are generated by setup.sh and injected here
apiVersion: v1
kind: Namespace
metadata:
  name: ruptura-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ruptura
  namespace: ruptura-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ruptura
rules:
  - apiGroups: [""]
    resources: [pods, services, endpoints, nodes, namespaces]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, statefulsets, replicasets, daemonsets]
    verbs: [get, list, watch, update, patch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ruptura
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ruptura
subjects:
  - kind: ServiceAccount
    name: ruptura
    namespace: ruptura-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ruptura-data
  namespace: ruptura-system
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: civo-volume
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruptura
  namespace: ruptura-system
  labels:
    app: ruptura
    version: v7.1.0
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ruptura
  template:
    metadata:
      labels:
        app: ruptura
        workload: ruptura-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/api/v2/metrics"
    spec:
      serviceAccountName: ruptura
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      terminationGracePeriodSeconds: 30
      containers:
        - name: ruptura
          image: ghcr.io/benfradjselim/ruptura:latest
          imagePullPolicy: Always
          ports:
            - name: api
              containerPort: 8080
            - name: otlp
              containerPort: 4317
          env:
            - name: RUPTURA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ruptura-secrets
                  key: api-key
            - name: RUPTURA_EDITION
              value: "community"
            - name: GOMEMLIMIT
              value: "400MiB"
            - name: RUPTURA_DEMO_MODE
              value: "false"
          args:
            - --storage=/data
            - --port=8080
            - --otlp-port=4317
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v2/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v2/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ruptura-data
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ruptura
  namespace: ruptura-system
spec:
  selector:
    app: ruptura
  ports:
    - name: api
      port: 8080
      targetPort: 8080
      nodePort: 31468
    - name: otlp
      port: 4317
      targetPort: 4317
      nodePort: 31470
  type: NodePort
---
# Ruptura UI
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruptura-ui
  namespace: ruptura-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ruptura-ui
  template:
    metadata:
      labels:
        app: ruptura-ui
    spec:
      containers:
        - name: ruptura-ui
          image: ghcr.io/benfradjselim/ruptura-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: RUPTURA_API_URL
              value: "http://ruptura.ruptura-system.svc.cluster.local:8080"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ruptura-ui
  namespace: ruptura-system
spec:
  selector:
    app: ruptura-ui
  ports:
    - port: 80
      targetPort: 80
      nodePort: 31469
  type: NodePort
