apiVersion: v1
kind: Namespace
metadata:
  name: mlops
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlops-data
  namespace: mlops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
  namespace: mlops
  labels:
    app: collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collector
  template:
    metadata:
      labels:
        app: collector
    spec:
      containers:
      - name: collector
        image: selimbf/mlops-collector:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
          name: http
        env:
        - name: COLLECTOR_PORT
          value: "8001"
        - name: DB_PATH
          value: "/data/mlops.db"
        - name: PROMETHEUS_URL
          value: "http://prometheus:9090"
        - name: COLLECT_INTERVAL_SEC
          value: "60"
        - name: K8S_NAMESPACES
          value: "default"
        - name: K8S_LOG_TAIL_LINES
          value: "100"
        - name: PROCESSOR_URL
          value: "http://processor:8002"
        - name: LOG_LEVEL
          value: "INFO"
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: mlops-data
---
apiVersion: v1
kind: Service
metadata:
  name: collector
  namespace: mlops
spec:
  selector:
    app: collector
  ports:
  - port: 8001
    targetPort: 8001
    name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor
  namespace: mlops
  labels:
    app: processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: processor
  template:
    metadata:
      labels:
        app: processor
    spec:
      containers:
      - name: processor
        image: selimbf/mlops-processor:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8002
          name: http
        env:
        - name: PROCESSOR_PORT
          value: "8002"
        - name: DB_PATH
          value: "/data/mlops.db"
        - name: ANOMALY_THRESHOLD
          value: "0.7"
        - name: PROCESSOR_INTERVAL_SEC
          value: "30"
        - name: ANOMALY_DETECTION_ENABLED
          value: "true"
        - name: LOG_LEVEL
          value: "INFO"
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: mlops-data
---
apiVersion: v1
kind: Service
metadata:
  name: processor
  namespace: mlops
spec:
  selector:
    app: processor
  ports:
  - port: 8002
    targetPort: 8002
    name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trainer
  namespace: mlops
  labels:
    app: trainer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trainer
  template:
    metadata:
      labels:
        app: trainer
    spec:
      containers:
      - name: trainer
        image: selimbf/mlops-trainer:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8003
          name: http
        env:
        - name: TRAINER_PORT
          value: "8003"
        - name: DB_PATH
          value: "/data/mlops.db"
        - name: MODEL_PATH
          value: "/data/models"
        - name: TRAIN_INTERVAL_SEC
          value: "3600"
        - name: LOG_LEVEL
          value: "INFO"
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: mlops-data
---
apiVersion: v1
kind: Service
metadata:
  name: trainer
  namespace: mlops
spec:
  selector:
    app: trainer
  ports:
  - port: 8003
    targetPort: 8003
    name: http
  type: ClusterIP
