# FBL-A1-5: single-command local path, no Kubernetes required.
#
#   docker compose up --build
#
# Starts the engine in demo mode (7 days of synthetic data, no calibration
# wait — see internal/sim/seed.go) and the dashboard, wired together the
# same way the Helm chart wires them in-cluster (deploy/docker-compose-ui-nginx.conf
# mirrors helm/templates/configmap-ui.yaml's proxy_pass rule).
#
# Dashboard: http://localhost:8081/ — log in with any username and the
# password below (auth is fail-closed with no key configured, see
# internal/api/middleware.go, so a key is required even for a laptop demo).
# Engine API: http://localhost:8080/api/v2/health
#
# Override the default dev key: RUPTURA_API_KEY=<your-key> docker compose up --build
#
# For local Go development without Docker at all:
#   cd workdir && go run ./cmd/ruptura --demo

services:
  ruptura:
    build:
      context: ./workdir
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "4317:4317"
    environment:
      RUPTURA_DEMO_MODE: "true"
      RUPTURA_API_KEY: ${RUPTURA_API_KEY:-ruptura-local-dev}
    volumes:
      - ruptura-data:/var/lib/ruptura/data
    healthcheck:
      test: ["CMD", "/ruptura", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5

  ruptura-ui:
    build:
      # Context is ./workdir (not ./workdir/ui): the Dockerfile's `COPY web
      # /usr/share/nginx/html` is relative to workdir/, matching how
      # release.yml's docker-ui job builds it (workdir/web is the Vite build
      # output, committed to git so no separate npm build step is needed here).
      context: ./workdir
      dockerfile: ui/Dockerfile
    ports:
      - "8081:80"
    volumes:
      - ./deploy/docker-compose-ui-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ruptura

volumes:
  ruptura-data:
