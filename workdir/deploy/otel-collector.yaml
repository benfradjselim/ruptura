---
# ServiceAccount + RBAC (retained for future k8s_cluster receiver use)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - services
      - namespaces
      - endpoints
      - resourcequotas
      - replicationcontrollers
      - limitranges
      - persistentvolumeclaims
      - persistentvolumes
      - events
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  config.yaml: |
    receivers:
      # Receive OTLP/HTTP — primary ingest point for load generators and SDKs
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        limit_mib: 256
        spike_limit_mib: 64
        check_interval: 5s

      batch:
        timeout: 10s
        send_batch_size: 512

      # Tag every metric/trace/log with the cluster label
      resource:
        attributes:
          - key: k8s.cluster.name
            value: ruptura-lab
            action: upsert

    exporters:
      # Forward to Ruptura OTLP/HTTP endpoint (note the /otlp prefix)
      otlphttp/ruptura:
        metrics_endpoint: http://ruptura.ruptura-system.svc.cluster.local:4317/otlp/v1/metrics
        traces_endpoint:  http://ruptura.ruptura-system.svc.cluster.local:4317/otlp/v1/traces
        logs_endpoint:    http://ruptura.ruptura-system.svc.cluster.local:4317/otlp/v1/logs
        tls:
          insecure: true
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s

      # Debug exporter — visible in collector logs with: kubectl logs -n monitoring deploy/otel-collector
      debug:
        verbosity: basic
        sampling_initial: 5
        sampling_thereafter: 20

    service:
      pipelines:
        metrics:
          receivers:  [otlp]
          processors: [memory_limiter, resource, batch]
          exporters:  [otlphttp/ruptura, debug]

        traces:
          receivers:  [otlp]
          processors: [memory_limiter, resource, batch]
          exporters:  [otlphttp/ruptura]

        logs:
          receivers:  [otlp]
          processors: [memory_limiter, resource, batch]
          exporters:  [otlphttp/ruptura]

      telemetry:
        metrics:
          address: 0.0.0.0:8888
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8888"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: otel-collector
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.103.0
          args: ["--config=/etc/otelcol/config.yaml"]
          ports:
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: metrics
              containerPort: 8888
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8888
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: metrics
      port: 8888
      targetPort: 8888
