---
# ohe-secrets — generate a strong random jwt-secret before applying:
#   kubectl create secret generic ohe-secrets -n ohe-system \
#     --from-literal=jwt-secret=$(openssl rand -hex 32)
#
# Or apply this template directly for dev/lab environments (insecure):
apiVersion: v1
kind: Secret
metadata:
  name: ohe-secrets
  namespace: ohe-system
  labels:
    app.kubernetes.io/name: ohe
    app.kubernetes.io/component: central
type: Opaque
stringData:
  jwt-secret: "REPLACE_ME_WITH_openssl_rand_hex_32"
