---
apiVersion: v1
kind: Namespace
metadata:
  name: ohe-system
  labels:
    app.kubernetes.io/name: ohe
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ohe-central
  namespace: ohe-system
  labels:
    app.kubernetes.io/name: ohe
    app.kubernetes.io/component: central
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ohe-agent
  namespace: ohe-system
  labels:
    app.kubernetes.io/name: ohe
    app.kubernetes.io/component: agent
---
# Central needs no K8s API access — it only reads/writes its own data
# Agent needs to read Pod metadata for container metric enrichment
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ohe-agent
  labels:
    app.kubernetes.io/name: ohe
    app.kubernetes.io/component: agent
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ohe-agent
  labels:
    app.kubernetes.io/name: ohe
subjects:
  - kind: ServiceAccount
    name: ohe-agent
    namespace: ohe-system
roleRef:
  kind: ClusterRole
  name: ohe-agent
  apiGroup: rbac.authorization.k8s.io
