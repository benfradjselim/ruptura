apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ohe-central-policy
  namespace: ohe-system
spec:
  podSelector:
    matchLabels:
      app: ohe-central
  policyTypes:
  - Ingress
  ingress:
  # Allow traffic from Agents on the same namespace
  - from:
    - podSelector:
        matchLabels:
          app: ohe-agent
    ports:
    - protocol: TCP
      port: 8080
  # Allow traffic from Prometheus/Monitoring if needed
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - protocol: TCP
      port: 8080
  # Allow traffic from Ingress Controller (if external)
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080
