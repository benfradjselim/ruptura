---
# PVC is defined in pvc.yaml — apply that file first.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ohe-central
  namespace: ohe-system
  labels:
    app.kubernetes.io/name: ohe
    app.kubernetes.io/component: central
    app.kubernetes.io/version: "4.0.0"
spec:
  replicas: 1          # Badger is single-writer; for HA use replicas: 1 + PVC RWO
  selector:
    matchLabels:
      app: ohe-central
  strategy:
    type: Recreate     # PVC is RWO — rolling update would cause two writers
  template:
    metadata:
      labels:
        app: ohe-central
        app.kubernetes.io/name: ohe
        app.kubernetes.io/component: central
    spec:
      serviceAccountName: ohe-central
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532        # distroless nonroot
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ohe
          image: ghcr.io/benfradjselim/ohe:4.0.0
          imagePullPolicy: IfNotPresent
          args:
            - central
            - --config=/etc/ohe/config.yaml
            - --storage=/var/lib/ohe/data
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: OHE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ohe-secrets
                  key: jwt-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/ohe/data
            - name: config
              mountPath: /etc/ohe
              readOnly: true
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 2
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ohe-data
        - name: config
          configMap:
            name: ohe-config
---
apiVersion: v1
kind: Service
metadata:
  name: ohe-central
  namespace: ohe-system
  labels:
    app.kubernetes.io/name: ohe
    app.kubernetes.io/component: central
spec:
  selector:
    app: ohe-central
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  type: ClusterIP
