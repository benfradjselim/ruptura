---
# PVC is defined in pvc.yaml — apply that file first.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruptura
  namespace: ruptura-system
  labels:
    app.kubernetes.io/name: ruptura
    app.kubernetes.io/component: server
    app.kubernetes.io/version: "6.2.2"
spec:
  replicas: 1
  # BadgerDB is single-writer; use Recreate with ReadWriteOnce PVC.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ruptura
  template:
    metadata:
      labels:
        app: ruptura
        app.kubernetes.io/name: ruptura
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: ruptura
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ruptura
          image: ghcr.io/benfradjselim/ruptura:6.2.2
          imagePullPolicy: IfNotPresent
          args:
            - --port=8080
            - --otlp-port=4317
            - --storage=/var/lib/ruptura/data
          ports:
            - name: api
              containerPort: 8080
              protocol: TCP
            - name: otlp
              containerPort: 4317
              protocol: TCP
          env:
            - name: RUPTURA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ruptura-secrets
                  key: api-key
                  optional: true
            - name: RUPTURA_INGEST_RPS
              valueFrom:
                configMapKeyRef:
                  name: ruptura-config
                  key: RUPTURA_INGEST_RPS
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /var/lib/ruptura/data
          livenessProbe:
            httpGet:
              path: /api/v2/health
              port: api
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v2/ready
              port: api
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 2
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ruptura-data
---
apiVersion: v1
kind: Service
metadata:
  name: ruptura
  namespace: ruptura-system
  labels:
    app.kubernetes.io/name: ruptura
    app.kubernetes.io/component: server
spec:
  selector:
    app: ruptura
  ports:
    - name: api
      port: 80
      targetPort: api
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: ruptura-otlp
  namespace: ruptura-system
  labels:
    app.kubernetes.io/name: ruptura
    app.kubernetes.io/component: server
spec:
  selector:
    app: ruptura
  ports:
    - name: otlp-http
      port: 4317
      targetPort: otlp
      protocol: TCP
  type: ClusterIP
