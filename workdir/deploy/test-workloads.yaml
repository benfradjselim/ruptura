---
apiVersion: v1
kind: Namespace
metadata:
  name: test-workloads
  labels:
    app.kubernetes.io/part-of: ruptura-lab
---
# ── nginx: simulates a stateless web workload ─────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: test-workloads
  labels:
    app: nginx
    workload-type: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          livenessProbe:
            httpGet: {path: /, port: 80}
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: test-workloads
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
---
# ── podinfo: demo app with built-in /metrics endpoint ─────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: podinfo
  namespace: test-workloads
  labels:
    app: podinfo
    workload-type: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: podinfo
  template:
    metadata:
      labels:
        app: podinfo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9898"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: podinfo
          image: stefanprodan/podinfo:6.7.0
          ports:
            - name: http
              containerPort: 9898
          env:
            - name: PODINFO_CACHE_SERVER
              value: ""
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet: {path: /healthz, port: 9898}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: {path: /readyz, port: 9898}
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: podinfo
  namespace: test-workloads
spec:
  selector:
    app: podinfo
  ports:
    - name: http
      port: 9898
      targetPort: 9898
---
# ── stress-app: simulates a CPU/memory-intensive workload ─────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stress-app
  namespace: test-workloads
  labels:
    app: stress-app
    workload-type: batch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stress-app
  template:
    metadata:
      labels:
        app: stress-app
    spec:
      containers:
        - name: stress
          image: alpine:3.20
          # Alternate: sleep vs light CPU burn so the workload shows variable load
          command: [sh, -c]
          args:
            - |
              while true; do
                # 30s CPU-light phase
                sleep 30
                # 10s CPU-heavy phase (visible in k8s metrics)
                for i in $(seq 1 10000); do echo $((i*i)) > /dev/null; done
              done
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 300m
              memory: 64Mi
---
# ── load-generator: sends OTLP traces+metrics to the OTel Collector ───────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: load-gen-script
  namespace: test-workloads
data:
  run.sh: |
    #!/bin/sh
    # Sends OTLP metrics + traces directly to Ruptura using metric names that
    # match analyzer.go: cpu_percent, memory_percent, error_rate, latency,
    # request_rate, timeout_rate, uptime_seconds, load_avg_1.
    # Pure sh + curl — no awk, no apk installs required.
    set -eu
    RUPTURA="${RUPTURA_ENDPOINT:-http://ruptura-otlp.ruptura-system.svc.cluster.local:4317}"
    SERVICES="nginx podinfo stress-app"

    echo "Load generator starting. Target: $RUPTURA"

    send_metrics() {
      SVC=$1; IDX=$2
      S=$(date +%s)
      TS="${S}000000000"

      # Pseudo-random via seconds + service index (no awk needed)
      CPU=$(( (S + IDX * 17 + 7) % 71 + 10 ))
      MEM=$(( (S + IDX * 31 + 3) % 56 + 20 ))
      ERR="0.$(printf '%03d' $(( (S + IDX * 13 + 5) % 115 + 5 )))"
      LAT="0.$(printf '%03d' $(( (S + IDX * 7  + 11) % 650 + 50 )))"
      REQ="0.$(printf '%03d' $(( (S + IDX * 11 + 2) % 600 + 300 )))"
      TOUT="0.$(printf '%03d' $(( (S + IDX * 3  + 1) % 38  + 2  )))"
      LOAD="0.$(printf '%03d' $(( (S + IDX * 5  + 9) % 600 + 100 )))"
      UPTIME=$(( S - 7200 + IDX * 1800 ))

      curl -sf -X POST "$RUPTURA/otlp/v1/metrics" \
        -H "Content-Type: application/json" \
        -d "{\"resourceMetrics\":[{\"resource\":{\"attributes\":[
              {\"key\":\"service.name\",        \"value\":{\"stringValue\":\"$SVC\"}},
              {\"key\":\"k8s.namespace.name\",  \"value\":{\"stringValue\":\"test-workloads\"}},
              {\"key\":\"k8s.deployment.name\", \"value\":{\"stringValue\":\"$SVC\"}},
              {\"key\":\"host.name\",           \"value\":{\"stringValue\":\"$SVC\"}}
            ]},\"scopeMetrics\":[{\"scope\":{\"name\":\"load-generator\"},\"metrics\":[
              {\"name\":\"cpu_percent\",    \"gauge\":{\"dataPoints\":[{\"asDouble\":$CPU,    \"timeUnixNano\":\"$TS\"}]}},
              {\"name\":\"memory_percent\", \"gauge\":{\"dataPoints\":[{\"asDouble\":$MEM,    \"timeUnixNano\":\"$TS\"}]}},
              {\"name\":\"error_rate\",     \"gauge\":{\"dataPoints\":[{\"asDouble\":$ERR,    \"timeUnixNano\":\"$TS\"}]}},
              {\"name\":\"latency\",        \"gauge\":{\"dataPoints\":[{\"asDouble\":$LAT,    \"timeUnixNano\":\"$TS\"}]}},
              {\"name\":\"request_rate\",   \"gauge\":{\"dataPoints\":[{\"asDouble\":$REQ,    \"timeUnixNano\":\"$TS\"}]}},
              {\"name\":\"timeout_rate\",   \"gauge\":{\"dataPoints\":[{\"asDouble\":$TOUT,   \"timeUnixNano\":\"$TS\"}]}},
              {\"name\":\"load_avg_1\",     \"gauge\":{\"dataPoints\":[{\"asDouble\":$LOAD,   \"timeUnixNano\":\"$TS\"}]}},
              {\"name\":\"uptime_seconds\", \"gauge\":{\"dataPoints\":[{\"asDouble\":$UPTIME, \"timeUnixNano\":\"$TS\"}]}}
            ]}]}]}" > /dev/null \
          && echo "  [ok] $SVC  cpu=${CPU}%  mem=${MEM}%  err=$ERR  lat=$LAT" \
          || echo "  [WARN] $SVC metrics failed — is ruptura-otlp reachable?"
    }

    send_traces() {
      SVC=$1; IDX=$2
      S=$(date +%s)
      TS="${S}000000000"
      END_TS="$(( S + 1 ))000000000"
      SC=$(( (S + IDX) % 13 == 0 ? 2 : 1 ))   # ~1 in 13 cycles is an error
      TRACE_ID=$(printf '%016x%016x' $(( S + IDX )) $(( S * 31337 + IDX * 7 )))
      SPAN_ID=$(printf '%016x' $(( S * 99991 + IDX )))

      curl -sf -X POST "$RUPTURA/otlp/v1/traces" \
        -H "Content-Type: application/json" \
        -d "{\"resourceSpans\":[{\"resource\":{\"attributes\":[
              {\"key\":\"service.name\",        \"value\":{\"stringValue\":\"$SVC\"}},
              {\"key\":\"k8s.namespace.name\",  \"value\":{\"stringValue\":\"test-workloads\"}},
              {\"key\":\"host.name\",           \"value\":{\"stringValue\":\"$SVC\"}}
            ]},\"scopeSpans\":[{\"scope\":{\"name\":\"load-generator\"},\"spans\":[{
              \"traceId\":\"$TRACE_ID\",\"spanId\":\"$SPAN_ID\",
              \"name\":\"HTTP GET /api\",
              \"startTimeUnixNano\":\"$TS\",\"endTimeUnixNano\":\"$END_TS\",
              \"status\":{\"code\":$SC}
            }]}]}]}" > /dev/null || true
    }

    while true; do
      echo "--- $(date -u '+%H:%M:%S') ---"
      IDX=0
      for SVC in $SERVICES; do
        send_metrics "$SVC" "$IDX"
        send_traces  "$SVC" "$IDX"
        IDX=$(( IDX + 1 ))
      done
      echo "  sleeping 15s..."
      sleep 15
    done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: test-workloads
  labels:
    app: load-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
        - name: load-gen
          image: curlimages/curl:8.7.1
          command: [sh, /scripts/run.sh]
          env:
            - name: RUPTURA_ENDPOINT
              value: http://ruptura-otlp.ruptura-system.svc.cluster.local:4317
          volumeMounts:
            - name: script
              mountPath: /scripts
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: script
          configMap:
            name: load-gen-script
            defaultMode: 0755
