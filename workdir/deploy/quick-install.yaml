---
# Ruptura Community Edition — one-command install
# kubectl apply -f https://raw.githubusercontent.com/benfradjselim/ruptura/main/deploy/quick-install.yaml
#
# What this creates:
#   - Namespace: ruptura-system
#   - ServiceAccount + ClusterRole + ClusterRoleBinding (read-only k8s discovery)
#   - PersistentVolumeClaim for BadgerDB storage
#   - Deployment: ruptura (engine + UI in one pod, Recreate strategy for RWO PVC)
#   - Service: NodePort 31468 (UI + API)
#
# Time to first dashboard: ~90 seconds
# To enable demo mode (no cluster data needed): set env RUPTURA_DEMO=true
apiVersion: v1
kind: Namespace
metadata:
  name: ruptura-system
  labels:
    app.kubernetes.io/name: ruptura
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ruptura
  namespace: ruptura-system
  labels:
    app.kubernetes.io/name: ruptura
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ruptura
  labels:
    app.kubernetes.io/name: ruptura
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "nodes", "namespaces", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ruptura
  labels:
    app.kubernetes.io/name: ruptura
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ruptura
subjects:
  - kind: ServiceAccount
    name: ruptura
    namespace: ruptura-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ruptura-data
  namespace: ruptura-system
  labels:
    app.kubernetes.io/name: ruptura
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruptura
  namespace: ruptura-system
  labels:
    app.kubernetes.io/name: ruptura
    app.kubernetes.io/component: server
    app.kubernetes.io/version: "7.0.29"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ruptura
  template:
    metadata:
      labels:
        app: ruptura
        app.kubernetes.io/name: ruptura
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/api/v2/metrics"
    spec:
      serviceAccountName: ruptura
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ruptura
          image: ghcr.io/benfradjselim/ruptura:latest
          imagePullPolicy: Always
          args:
            - --port=8080
            - --otlp-port=4317
            - --storage=/var/lib/ruptura/data
          env:
            - name: RUPTURA_EDITION
              value: "community"
            # Set to "true" to enable demo mode with synthetic workloads (no cluster required)
            # - name: RUPTURA_DEMO
            #   value: "true"
          ports:
            - name: api
              containerPort: 8080
              protocol: TCP
            - name: otlp
              containerPort: 4317
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/lib/ruptura/data
          readinessProbe:
            httpGet:
              path: /api/v2/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v2/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ruptura-data
---
apiVersion: v1
kind: Service
metadata:
  name: ruptura
  namespace: ruptura-system
  labels:
    app.kubernetes.io/name: ruptura
spec:
  type: NodePort
  selector:
    app: ruptura
  ports:
    - name: api
      port: 8080
      targetPort: 8080
      nodePort: 31468
      protocol: TCP
