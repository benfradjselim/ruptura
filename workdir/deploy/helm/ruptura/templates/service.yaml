apiVersion: v1
kind: Service
metadata:
  name: {{ include "ruptura.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ruptura.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "ruptura.selectorLabels" . | nindent 4 }}
  ports:
    - name: api
      port: {{ .Values.service.apiPort }}
      targetPort: api
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ruptura.fullname" . }}-otlp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ruptura.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "ruptura.selectorLabels" . | nindent 4 }}
  ports:
    - name: otlp-http
      port: {{ .Values.service.otlpPort }}
      targetPort: otlp
      protocol: TCP
