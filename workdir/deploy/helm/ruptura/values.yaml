replicaCount: 1

image:
  repository: ghcr.io/benfradjselim/ruptura
  tag: "6.2.2"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  apiPort: 80
  otlpPort: 4317

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ruptura.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"

storage:
  size: 10Gi
  # storageClassName: ""   # leave empty to use cluster default

auth:
  # Provide a strong random value: openssl rand -hex 32
  # If empty, auth is disabled (dev only).
  apiKey: ""
  # Reference an existing secret instead of creating one:
  existingSecret: ""
  existingSecretKey: "api-key"

config:
  ingestRPS: "1000"
  logLevel: "info"

rbac:
  create: true

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

serviceMonitor:
  enabled: false
  interval: "15s"
  namespace: ""
  additionalLabels: {}

grafana:
  dashboards:
    enabled: false
