apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: oheclusters.ohe.io
  labels:
    app.kubernetes.io/name: ohe
spec:
  group: ohe.io
  scope: Namespaced
  names:
    plural: oheclusters
    singular: ohecluster
    kind: OHECluster
    shortNames: [ohec]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Mode
          type: string
          jsonPath: .spec.mode
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Ready
          type: string
          jsonPath: .status.readyReplicas
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [central, agent]
                  description: "Deployment mode: 'central' (API+storage) or 'agent' (collector)"
                replicas:
                  type: integer
                  minimum: 1
                  maximum: 10
                  default: 1
                  description: "Number of replicas. Central mode must use 1 (Badger is single-writer)."
                image:
                  type: string
                  description: "OHE container image override (default: ghcr.io/benfradjselim/ohe:4.0.0)"
                centralURL:
                  type: string
                  description: "Central server URL for agent mode (e.g. http://ohe-central.ohe-system)"
                storageSize:
                  type: string
                  default: "10Gi"
                  description: "PVC size for central mode storage"
                authEnabled:
                  type: boolean
                  default: true
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:    { type: string }
                        memory: { type: string }
                    limits:
                      type: object
                      properties:
                        cpu:    { type: string }
                        memory: { type: string }
            status:
              type: object
              properties:
                readyReplicas:
                  type: integer
                availableReplicas:
                  type: integer
                phase:
                  type: string
                  enum: [Pending, Running, Degraded, Failed]
                message:
                  type: string
                lastReconcileTime:
                  type: string
                  format: date-time
                observedGeneration:
                  type: integer
