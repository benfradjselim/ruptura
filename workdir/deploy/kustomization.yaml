apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ruptura-system

resources:
  - rbac.yaml
  - configmap.yaml
  - pvc.yaml
  - central-deployment.yaml

# Override image tag for a specific release
images:
  - name: ghcr.io/benfradjselim/ruptura
    newTag: "6.7.0"

# Generate the API key secret (override with your own value before deploying)
secretGenerator:
  - name: ruptura-secrets
    literals:
      - api-key=change-me-before-deploy
    options:
      disableNameSuffixHash: true
