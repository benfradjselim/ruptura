apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ohe-system

resources:
  - rbac.yaml
  - configmap.yaml
  - pvc.yaml              # must come before central-deployment.yaml
  - central-deployment.yaml
  - agent-daemonset.yaml
  - crd/oheclusters.yaml
  - operator.yaml

# Override image tag for a specific release
images:
  - name: ghcr.io/benfradjselim/ohe
    newTag: "4.0.0"

# Generate the JWT secret (override with your own value before deploying)
secretGenerator:
  - name: ohe-secrets
    literals:
      - jwt-secret=change-me-before-deploy
    options:
      disableNameSuffixHash: true
