---
# PersistentVolumeClaim for ohe-central (Badger time-series data).
# Apply this BEFORE central-deployment.yaml.
# This file is kept separate so a re-deploy of the Deployment/Service
# never accidentally deletes data.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ohe-data
  namespace: ohe-system
  labels:
    app.kubernetes.io/name: ohe
    app.kubernetes.io/component: central
  annotations:
    # Prevent accidental deletion via kubectl delete -f deploy/
    helm.sh/resource-policy: keep
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
  # storageClassName: standard   # uncomment and set for your cluster
