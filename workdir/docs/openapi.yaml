        "204":
          description: Accepted

  /loki/api/v1/query_range:
    get:
      tags: [loki-compat]
      summary: Loki-compatible range query
      responses:
        "200":
          description: Loki query result

  /loki/api/v1/labels:
    get:
      tags: [loki-compat]
      summary: Loki label names
      responses:
        "200":
          description: Label list

  /loki/api/v1/label/{name}/values:
    get:
      tags: [loki-compat]
      summary: Loki label values
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Value list

  # ── Elasticsearch compat ──────────────────────────────────────────────────────

  /_bulk:
    post:
      tags: [es-compat]
      summary: Elasticsearch bulk ingest
      security: []
      responses:
        "200":
          description: Bulk result

  /_search:
    get:
      tags: [es-compat]
