      responses:
        "200":
          description: Search result
    post:
      tags: [es-compat]
      summary: Elasticsearch search (POST body)
      responses:
        "200":
          description: Search result

  /_cat/indices:
    get:
      tags: [es-compat]
      summary: Elasticsearch cat indices
