version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign

formatters:
  enable:
    - gofmt

issues:
  exclude-rules:
    # Test files: unchecked errors from local httptest servers are expected
    - path: "_test\\.go"
      linters:
        - errcheck

    # WebSocket: deadline/close errors mean the connection is already dead
    - path: "websocket\\.go"
      text: "WriteMessage|SetWriteDeadline|SetReadDeadline"
      linters:
        - errcheck

    # io.Copy drain on response body — error = connection dead, nothing actionable
    - path: "handlers\\.go|orchestrator\\.go"
      text: "io.Copy"
      linters:
        - errcheck
