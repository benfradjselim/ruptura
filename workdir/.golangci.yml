run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign

issues:
  exclude-rules:
    # Test files: unchecked errors from local httptest servers are expected
    - path: "_test\\.go"
      linters:
        - errcheck

    # io.Copy drain on response body — error = connection dead, nothing actionable
    - path: "handlers.*\\.go"
      text: "io.Copy"
      linters:
        - errcheck

    - path: "cmd/ruptura/main\\.go"
      text: "io.Copy"
      linters:
        - errcheck
