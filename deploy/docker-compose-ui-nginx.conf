server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Proxy all API calls to the core ruptura engine — "ruptura" resolves via
    # Docker Compose's built-in service DNS. Mirrors helm/templates/configmap-ui.yaml,
    # which does the same thing for the Kubernetes deployment.
    location /api/ {
        proxy_pass http://ruptura:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # SPA catch-all: serve index.html for any path not found on disk.
    location / {
        try_files $uri /index.html;
    }
}
