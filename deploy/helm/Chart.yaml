import logging
import kubernetes
from kubernetes import client, config
from typing import Dict
import json

# Set up logging
logging.basicConfig(level=logging.INFO)
logger = logging.getLogger(__name__)

def load_kube_config() -> None:
    """
    Load Kubernetes configuration.

    Raises:
        kubernetes.config.ConfigException: If the configuration cannot be loaded.
    """
    try:
        config.load_kube_config()
    except kubernetes.config.ConfigException as e:
        logger.error(f"Erreur lors du chargement de la configuration Kubernetes : {e}")
        raise kubernetes.config.ConfigException("Erreur lors du chargement de la configuration Kubernetes")

def validate_chart(chart: Dict) -> None:
    """
    Validate the Helm chart.

    Args:
        chart (Dict): The Helm chart.

    Raises:
        ValueError: If the chart is invalid.
    """
    if not isinstance(chart, dict):
        raise ValueError("La chart doit être un dictionnaire")

    required_keys = ["apiVersion", "kind", "metadata"]
    if not all(key in chart for key in required_keys):
        raise ValueError("La chart est invalide. Les clés requises manquent.")

def create_helm_chart(chart: Dict) -> client.V1Package:
    """
    Create the Helm chart.

    Args:
        chart (Dict): The Helm chart.

    Returns:
        client.V1Package: The created Helm chart.

    Raises:
        kubernetes.client.ApiException: If the chart cannot be created.
    """
    try:
        api = client.AppsV1Api()
        package = api.create_namespaced_package("default", chart)
        return package
    except kubernetes.client.ApiException as e:
        logger.error(f"Erreur lors de la création de la chart Helm : {e}")
        raise kubernetes.client.ApiException("Erreur lors de la création de la chart Helm")

def main() -> None:
    """
    Main function.

    Raises:
        Exception: If an error occurs.
    """
    try:
        load_kube_config()
        chart = {"apiVersion": "v1", "kind": "Deployment", "metadata": {"name": "my-deployment"}}
        validate_chart(chart)
        package = create_helm_chart(chart)
        logger.info(f"Chart Helm créée avec succès : {package}")
    except Exception as e:
        logger.error(f"Erreur inattendue : {e}")
        raise

if __name__ == "__main__":
    main()