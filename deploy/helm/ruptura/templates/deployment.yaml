apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ruptura.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ruptura.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Badger (embedded KV) is single-writer; Recreate avoids two pods fighting over the PVC.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "ruptura.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ruptura.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ruptura.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: ruptura
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - "--port"
            - "8080"
            - "--storage"
            - "/var/lib/ruptura/data"
            {{- if or .Values.apiKey .Values.existingSecret }}
            - "--api-key"
            - "$(RUPTURA_API_KEY)"
            {{- end }}
          {{- if or .Values.apiKey .Values.existingSecret }}
          env:
            - name: RUPTURA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ruptura.secretName" . }}
                  key: api-key
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/ruptura/data
            # distroless nonroot needs a writable /tmp for Badger temp files
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ruptura.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
