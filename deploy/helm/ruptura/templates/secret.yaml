{{- if and (not .Values.existingSecret) .Values.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ruptura.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ruptura.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ .Values.apiKey | quote }}
{{- end }}
