# src/monitoring/prometheus/dashboard.yaml

---
apiVersion: 1
description: Monitoring Overview Dashboard
title: Monitoring Overview
dashboards:
  - name: Overview
    description: General monitoring metrics
    rows:
      - title: Key Metrics
        panels:
          - title: Instance Status
            query: up
            unit: boolean
          - title: CPU Usage
            query: 100 - (100 * idle::sum / (sum::sum without (cpu)))
            unit: percent
          - title: Memory Usage
            query: (1 - memoryAvailable::sum / memoryTotal::sum) * 100
            unit: percent
          - title: Disk Usage
            query: (1 - node_filesystem_free_bytes::sum / node_filesystem_size_bytes::sum) * 100
            unit: percent

      - title: HTTP Metrics
        panels:
          - title: HTTP Requests Total
            query: http_server_requests_total
            unit: requests_total
          - title: HTTP Success Rate
            query: (http_server_requests_total - http_server_requests_failed_total) / http_server_requests_total
            unit: ratio
          - title: HTTP Error Rate
            query: http_server_requests_failed_total / http_server_requests_total
            unit: ratio
          - title: HTTP Request Duration
            query: http_server_request_duration_seconds_bucket
            unit: seconds