name: Cleanup and redeploy lab

on:
  workflow_dispatch:
    inputs:
      skip_prometheus:
        description: "Skip Prometheus redeploy (just cleanup + lab workloads)"
        required: false
        default: "false"

jobs:
  cleanup:
    name: Cleanup and redeploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.K3S_KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "${KUBECONFIG_B64}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info

      - name: Delete all failed/completed/evicted pods cluster-wide
        run: |
          echo "=== Deleting failed pods ==="
          kubectl delete pods --all-namespaces --field-selector status.phase=Failed 2>/dev/null | tail -5 || true
          echo "=== Deleting succeeded/completed pods ==="
          kubectl delete pods --all-namespaces --field-selector status.phase=Succeeded 2>/dev/null | tail -5 || true
          echo "Cleanup done."

      - name: Nuke observability namespace (stale kube-state-metrics)
        run: |
          kubectl delete namespace observability --ignore-not-found=true
          echo "observability namespace deleted (or did not exist)"

      - name: Nuke monitoring namespace (crash-looping prometheus)
        run: |
          kubectl delete namespace monitoring --ignore-not-found=true
          echo "monitoring namespace deleted"

      - name: Wait for namespace deletion
        run: |
          for ns in monitoring observability; do
            echo "Waiting for $ns to terminate..."
            kubectl wait --for=delete namespace/$ns --timeout=120s 2>/dev/null || true
          done
          echo "Namespaces cleared."

      - name: Redeploy Prometheus (monitoring namespace)
        if: ${{ github.event.inputs.skip_prometheus != 'true' }}
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

          cat > /tmp/prom-values.yaml <<'EOF'
          server:
            service:
              type: NodePort
              nodePort: 30090
            persistentVolume:
              enabled: false

          alertmanager:
            enabled: false
          prometheus-pushgateway:
            enabled: false
          prometheus-node-exporter:
            enabled: false

          kube-state-metrics:
            enabled: true

          extraScrapeConfigs: |
            - job_name: kubernetes-cadvisor
              scheme: https
              tls_config:
                insecure_skip_verify: true
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              kubernetes_sd_configs:
                - role: node
              relabel_configs:
                - action: labelmap
                  regex: __meta_kubernetes_node_label_(.+)
                - target_label: __metrics_path__
                  replacement: /metrics/cadvisor
                - source_labels: [__address__]
                  regex: "([^:]+)(?::\\d+)?"
                  target_label: __address__
                  replacement: "${1}:10250"
              metric_relabel_configs:
                - action: keep
                  source_labels: [__name__]
                  regex: "container_cpu_usage_seconds_total|container_memory_working_set_bytes|container_start_time_seconds|kube_pod_container_status_restarts_total"
                - action: drop
                  source_labels: [container]
                  regex: "(POD|)"
          EOF

          helm upgrade --install prometheus prometheus-community/prometheus \
            --namespace monitoring \
            --values /tmp/prom-values.yaml \
            --wait --timeout=5m
          echo "Prometheus deployed."

      - name: Wait for Prometheus
        if: ${{ github.event.inputs.skip_prometheus != 'true' }}
        run: |
          kubectl rollout status deployment/prometheus-server -n monitoring --timeout=3m
          kubectl rollout status deployment/prometheus-kube-state-metrics -n monitoring --timeout=2m
          echo "Prometheus ready."

      - name: Wire Prometheus datasource into Ruptura
        if: ${{ github.event.inputs.skip_prometheus != 'true' }}
        env:
          RUPTURA_API_KEY: ${{ secrets.RUPTURA_API_KEY }}
          NODE_IP: "185.229.225.115"
          API_PORT: "31468"
        run: |
          HTTP=$(curl -s -o /tmp/r.json -w "%{http_code}" \
            -X POST "http://${NODE_IP}:${API_PORT}/api/v2/datasources" \
            -H "Authorization: Bearer ${RUPTURA_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "id":   "prometheus-cluster",
              "name": "Prometheus (cluster)",
              "type": "prometheus",
              "url":  "http://185.229.225.115:30090",
              "enabled": true,
              "scrape_interval_seconds": 30,
              "namespace": "ruptura-lab"
            }')
          cat /tmp/r.json; echo ""
          [ "$HTTP" = "201" ] || [ "$HTTP" = "200" ] || [ "$HTTP" = "409" ] && echo "✓ datasource wired" || { echo "✗ HTTP $HTTP"; exit 1; }

      - name: Redeploy lab workloads (fixed manifests)
        run: |
          kubectl apply -f k8s/lab/workloads.yaml
          echo ""
          echo "=== Waiting for stable workloads ==="
          kubectl rollout status deployment/api-gateway     -n ruptura-lab --timeout=3m || true
          kubectl rollout status deployment/order-processor -n ruptura-lab --timeout=3m || true

      - name: Final cluster state
        run: |
          echo "=== Running pods ==="
          kubectl get pods --all-namespaces --field-selector status.phase=Running -o wide
          echo ""
          echo "=== Failed pods remaining ==="
          kubectl get pods --all-namespaces --field-selector status.phase=Failed -o name | wc -l
          echo ""
          echo "=== NodePorts ==="
          kubectl get svc --all-namespaces | grep NodePort || true
          echo ""
          echo "=== Node status ==="
          kubectl get nodes -o wide
          kubectl top nodes 2>/dev/null || true
