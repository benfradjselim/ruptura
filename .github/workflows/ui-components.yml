name: UI Components

on:
  push:
    branches: ["v7", "main"]
    paths: ["ui/**"]
  pull_request:
    branches: ["v7", "main"]
    paths: ["ui/**"]

jobs:
  component-tests:
    name: "${{ matrix.component }} tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    strategy:
      fail-fast: false
      matrix:
        component:
          - NavBar
          - WorkloadCard
          - SuppressionModal
          - WeightsModal
          - TopologyMap

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test ${{ matrix.component }}
        run: npx vitest run src/components/__tests__/${{ matrix.component }}.test.ts

  ui-build:
    name: UI — Vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run check
