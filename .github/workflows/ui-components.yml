name: UI Components

on:
  push:
    branches: ["main"]
    paths: ["workdir/ui/**"]
  pull_request:
    branches: ["main"]
    paths: ["workdir/ui/**"]

jobs:
  build-and-lint:
    name: UI — Build & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workdir/ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: workdir/ui/package-lock.json

      - name: Sync version.json
        working-directory: workdir
        run: |
          VERSION=$(grep 'const version' cmd/ruptura/main.go | sed 's/.*"\(.*\)".*/\1/')
          echo "{\"version\":\"$VERSION\"}" > ui/public/version.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check for build artifacts
        working-directory: workdir
        run: |
          test -d web && echo "Build successful: workdir/web/ exists" || (echo "Build failed: no workdir/web/" && exit 1)
          ls -la web/
