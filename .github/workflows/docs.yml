name: Build and Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - 'docs/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git-revision-date-localized plugin

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r site/requirements.txt

      - name: Build site
        run: cd site && mkdocs build --strict

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # FBL-A1-3: the deploy step reporting success doesn't guarantee Pages
      # itself is reachable (wrong source setting, 403, DNS not yet
      # propagated) — this is the check that would have caught that.
      - name: Verify the deployed site is actually reachable
        run: |
          url="${{ steps.deployment.outputs.page_url }}"
          for i in 1 2 3 4 5; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url" || echo "000")
            echo "attempt $i: ${url} -> ${status}"
            if [ "$status" = "200" ]; then
              exit 0
            fi
            sleep 15
          done
          echo "::error::Pages deploy reported success but ${url} did not return 200 after 5 attempts"
          exit 1
