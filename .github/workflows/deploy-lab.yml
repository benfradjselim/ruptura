name: Deploy ruptura-lab workloads

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Apply lab workloads to k3s
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v7

      - uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.K3S_KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "${KUBECONFIG_B64}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info

      - name: Clean up evicted and failed pods
        run: |
          kubectl delete pods -n ruptura-lab --field-selector=status.phase=Failed --ignore-not-found=true || true

      - name: Apply lab workloads
        run: |
          kubectl apply -f k8s/lab/workloads.yaml
          echo ""
          echo "=== Waiting for deployments ==="
          kubectl rollout status deployment/api-gateway        -n ruptura-lab --timeout=4m
          kubectl rollout status deployment/payment-service    -n ruptura-lab --timeout=4m || true
          kubectl rollout status deployment/cache-worker       -n ruptura-lab --timeout=4m || true
          kubectl rollout status deployment/order-processor    -n ruptura-lab --timeout=4m
          kubectl rollout status deployment/ml-inference       -n ruptura-lab --timeout=4m || true
          kubectl rollout status deployment/inventory-service  -n ruptura-lab --timeout=4m || true
          # notification-worker crash-loops by design — just wait for it to exist
          kubectl wait pod -l app=notification-worker -n ruptura-lab --for=condition=Ready --timeout=60s || true

      - name: Show pod status
        run: |
          kubectl get pods -n ruptura-lab -o wide
          echo ""
          kubectl top pods -n ruptura-lab 2>/dev/null || echo "(metrics-server not available)"

      - name: Wire ruptura-lab datasource into Ruptura
        env:
          RUPTURA_API_KEY: ${{ secrets.RUPTURA_API_KEY }}
          NODE_IP: "185.229.225.115"
          API_PORT: "31468"
        run: |
          # Add ruptura-lab as a second Prometheus datasource scoped to that namespace
          HTTP=$(curl -s -o /tmp/r.json -w "%{http_code}" \
            -X POST "http://${NODE_IP}:${API_PORT}/api/v2/datasources" \
            -H "Authorization: Bearer ${RUPTURA_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "id":   "prometheus-ruptura-lab",
              "name": "Prometheus (ruptura-lab)",
              "type": "prometheus",
              "url":  "http://prometheus-server.monitoring.svc.cluster.local:80",
              "enabled": true,
              "scrape_interval_seconds": 30,
              "namespace": "ruptura-lab"
            }')
          cat /tmp/r.json; echo ""
          [ "$HTTP" = "201" ] || [ "$HTTP" = "200" ] && echo "✓ datasource wired" || { echo "✗ HTTP $HTTP"; exit 1; }

      - name: Wait for k8smetrics poller cycles and verify KPI signals
        env:
          RUPTURA_API_KEY: ${{ secrets.RUPTURA_API_KEY }}
          NODE_IP: "185.229.225.115"
          API_PORT: "31468"
        run: |
          echo "Waiting 90s for k8smetrics poller to collect 2-3 cycles..."
          sleep 90

          echo ""
          echo "=== Fleet KPIs ==="
          curl -sf \
            -H "Authorization: Bearer ${RUPTURA_API_KEY}" \
            "http://${NODE_IP}:${API_PORT}/api/v2/fleet" | python3 -c "
import sys, json
data = json.load(sys.stdin)
workloads = data if isinstance(data, list) else data.get('workloads', [])
print(f\"{'Workload':<55} {'stress':>7} {'pressure':>9} {'fatigue':>8} {'health':>7}\")
print('-' * 90)
for w in sorted(workloads, key=lambda x: x.get('health_score', 100)):
    name = w.get('workload_key') or w.get('name') or w.get('id') or '?'
    print(f\"{name:<55} {w.get('stress',0):>7.1f} {w.get('pressure',0):>9.1f} {w.get('fatigue',0):>8.1f} {w.get('health_score',0):>7.1f}\")
" 2>/dev/null || curl -sf \
            -H "Authorization: Bearer ${RUPTURA_API_KEY}" \
            "http://${NODE_IP}:${API_PORT}/api/v2/fleet" | python3 -m json.tool | head -80

          echo ""
          echo "=== Per-workload detail (ruptura-lab) ==="
          for workload in payment-service cache-worker ml-inference notification-worker; do
            echo "--- ${workload} ---"
            curl -sf \
              -H "Authorization: Bearer ${RUPTURA_API_KEY}" \
              "http://${NODE_IP}:${API_PORT}/api/v2/rupture/ruptura-lab/Deployment/${workload}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps({k:round(v,2) if isinstance(v,float) else v for k,v in d.items() if k in ['stress','pressure','fatigue','health_score','mood','entropy','velocity','resilience']}, indent=2))" 2>/dev/null || echo "(no data yet)"
          done

          echo ""
          echo "=== Ruptures / Forecasts ==="
          curl -sf \
            -H "Authorization: Bearer ${RUPTURA_API_KEY}" \
            "http://${NODE_IP}:${API_PORT}/api/v2/ruptures" | python3 -m json.tool | head -80
