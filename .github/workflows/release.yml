name: Release ruptura

on:
  push:
    tags:
      - "v[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build and deploy (e.g. v7.0.0)"
        required: true
        default: "v7.0.0"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ruptura
  DOCKERHUB_IMAGE: selimbf/ruptura
  HELM_CHART: helm

# ── Permissions ───────────────────────────────────────────────────────────────
# packages: write  → push Helm chart to GHCR OCI
# id-token: write  → Cosign OIDC keyless signing
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ── Stage 1–2: Build & test Go binary ─────────────────────────────────────
  ci:
    name: CI — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workdir
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: workdir/go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./...

  # ── Stage 2.5: Build ruptura-ctl binaries & attach to GitHub release ────
  build-cli:
    name: CLI — Build & Attach to Release
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: write
    defaults:
      run:
        working-directory: workdir
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: workdir/go.sum

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ruptura-ctl (linux/amd64, linux/arm64, darwin/arm64)
        run: |
          GOOS=linux  GOARCH=amd64 go build -trimpath -ldflags="-s -w" \
            -o /tmp/ruptura-ctl-linux-amd64  ./cmd/ruptura-ctl
          GOOS=linux  GOARCH=arm64 go build -trimpath -ldflags="-s -w" \
            -o /tmp/ruptura-ctl-linux-arm64  ./cmd/ruptura-ctl
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" \
            -o /tmp/ruptura-ctl-darwin-arm64 ./cmd/ruptura-ctl

      - name: Attach binaries to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            /tmp/ruptura-ctl-linux-amd64 \
            /tmp/ruptura-ctl-linux-arm64 \
            /tmp/ruptura-ctl-darwin-arm64 \
            --clobber

  # ── Stage 3: Build & push ruptura-ui Docker image ────────────────────────
  docker-ui:
    name: Docker UI — Build & Push
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      ui-tag: ${{ steps.resolve-tag.outputs.tag }}
    env:
      UI_IMAGE: ${{ github.repository_owner }}/ruptura-ui
    steps:
      - uses: actions/checkout@v4

      - name: Resolve UI image tag
        id: resolve-tag
        run: |
          # UI image is always tagged ui-v<semver> independently of core
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CORE="${{ github.event.inputs.tag }}"
          else
            CORE="${{ github.ref_name }}"
          fi
          # Strip leading 'v' and prepend 'ui-v'
          echo "tag=ui-v${CORE#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: workdir/ui/package-lock.json
          # workdir/ui is the active UI; ui/ at root is archived

      - name: Sync UI version.json from Go const
        run: |
          VERSION=$(grep 'const version' workdir/cmd/ruptura/main.go | sed 's/.*"\(.*\)".*/\1/')
          echo "{\"version\":\"$VERSION\"}" > workdir/ui/public/version.json
          echo "Synced version.json to $VERSION"

      - name: Install & build Svelte app
        working-directory: workdir/ui
        run: npm ci && npm run build

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ruptura-ui
        uses: docker/build-push-action@v5
        with:
          context: ./workdir
          file: ./workdir/ui/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.UI_IMAGE }}:${{ steps.resolve-tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.UI_IMAGE }}:latest
          # amd64 only: the lab runs amd64, and QEMU arm64 npm builds take 40+ min.
          # Add linux/arm64 back once the Dockerfile is confirmed stable on amd64.
          platforms: linux/amd64

  # ── Stage 3–4: Build & push ruptura core Docker image ────────────────────
  docker:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      image-ref: docker.io/${{ env.DOCKERHUB_IMAGE }}
      image-tag: ${{ steps.resolve-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: resolve-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=${{ steps.resolve-tag.outputs.tag }}
            type=raw,value=latest

      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./workdir
          file: ./workdir/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.resolve-tag.outputs.tag }}
          no-cache: true
          platforms: linux/amd64,linux/arm64

  # ── Stage 5: Cosign — keyless OIDC signature ─────────────────────────────
  cosign:
    name: Cosign — Sign Image
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Sign image digest (keyless OIDC)
        run: |
          cosign sign --yes \
            "${{ needs.docker.outputs.image-ref }}@${{ needs.docker.outputs.digest }}"

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ needs.docker.outputs.image-ref }}@${{ needs.docker.outputs.digest }}"

  # ── Stage 6: Helm — lint, package, push to GHCR OCI ─────────────────────
  helm-publish:
    name: Helm — Package & Publish
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Lint chart
        run: helm lint ${{ env.HELM_CHART }}

      - name: Package chart
        run: |
          helm package ${{ env.HELM_CHART }} --destination /tmp/chart
          ls -la /tmp/chart/

      - name: Push chart to GHCR OCI
        run: |
          helm push /tmp/chart/*.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Upload chart as artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: /tmp/chart/*.tgz

  # ── Stage 6.5: Check deploy prerequisites ─────────────────────────────────
  # Sets has_cluster=true only when K3S_KUBECONFIG secret is non-empty.
  # The deploy job is skipped (not failed) when no cluster is configured.
  check-deploy:
    name: Check — deploy prerequisites
    runs-on: ubuntu-latest
    needs: [cosign, helm-publish]
    outputs:
      has_cluster: ${{ steps.check.outputs.has_cluster }}
    steps:
      - name: Detect kubeconfig secret
        id: check
        env:
          KUBECONFIG_B64: ${{ secrets.K3S_KUBECONFIG }}
        run: |
          if [ -n "${KUBECONFIG_B64}" ]; then
            echo "has_cluster=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::K3S_KUBECONFIG not set — deploy will be skipped"
            echo "has_cluster=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Stage 7: Deploy to k3s ─────────────────────────────────────────────────
  # Prerequisites (set in repo Settings → Secrets and variables → Actions):
  #   K3S_KUBECONFIG  : base64 of /etc/rancher/k3s/k3s.yaml with server IP replaced
  #   RUPTURA_API_KEY : (optional) bearer token for the Ruptura API
  #
  # To get K3S_KUBECONFIG from your workspace VM:
  #   sudo cat /etc/rancher/k3s/k3s.yaml \
  #     | sed 's/127.0.0.1/<your-vm-ip>/g' \
  #     | base64 -w0
  # Then paste the output as the K3S_KUBECONFIG secret.
  deploy:
    name: Deploy — k3s
    runs-on: ubuntu-latest
    needs: [check-deploy, docker, docker-ui, build-cli]
    if: needs.check-deploy.outputs.has_cluster == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        run: |
          echo "${{ secrets.K3S_KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Helm upgrade/install ruptura
        env:
          TAG: ${{ needs.docker.outputs.image-tag }}
          RUPTURA_API_KEY: ${{ secrets.RUPTURA_API_KEY }}
        run: |
          CHART_VERSION=$(grep '^version:' helm/Chart.yaml | awk '{print $2}')
          helm upgrade --install ruptura \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/ruptura \
            --version "${CHART_VERSION}" \
            --namespace ruptura-system \
            --create-namespace \
            --set image.tag="${TAG}" \
            --set "image.digest=${{ needs.docker.outputs.digest }}" \
            --set apiKey="${RUPTURA_API_KEY}" \
            --set service.type=NodePort \
            --set service.nodePorts.api=31468 \
            --set service.nodePorts.otlp=30298 \
            --set persistence.size=5Gi \
            --set resources.limits.memory=2Gi \
            --set resources.requests.memory=256Mi \
            --set-string goMemLimit="1700MiB" \
            --set "podAnnotations.deploy/commit=${{ github.sha }}" \
            --set ui.enabled=true \
            --set "ui.image.tag=${{ needs.docker-ui.outputs.ui-tag }}" \
            --set "podAnnotations.deploy/ui-sha=${{ github.sha }}" \
            --set ui.service.type=NodePort \
            --set ui.nodePort=31469 \
            --kubeconfig /tmp/kubeconfig \
            --atomic \
            --timeout 10m

      - name: Install ruptura-ctl on k3s node
        env:
          TAG: ${{ needs.docker.outputs.image-tag }}
        run: |
          # Run a privileged Job on the node to download and install the CLI binary
          kubectl --kubeconfig /tmp/kubeconfig apply -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: install-ruptura-ctl
            namespace: ruptura-system
          spec:
            ttlSecondsAfterFinished: 300
            template:
              spec:
                hostNetwork: true
                restartPolicy: Never
                volumes:
                  - name: host-bin
                    hostPath:
                      path: /usr/local/bin
                containers:
                  - name: installer
                    image: alpine:3.19
                    command:
                      - sh
                      - -c
                      - |
                        apk add --no-cache curl && \
                        curl -sSfL -o /host-bin/ruptura-ctl \
                          https://github.com/benfradjselim/ruptura/releases/download/${TAG}/ruptura-ctl-linux-amd64 && \
                        chmod +x /host-bin/ruptura-ctl && \
                        echo "Installed ruptura-ctl: \$(/host-bin/ruptura-ctl version)"
                    volumeMounts:
                      - name: host-bin
                        mountPath: /host-bin
                    securityContext:
                      privileged: true
          EOF
          kubectl --kubeconfig /tmp/kubeconfig wait \
            --for=condition=complete \
            --timeout=120s \
            job/install-ruptura-ctl \
            -n ruptura-system || \
            kubectl --kubeconfig /tmp/kubeconfig logs \
              -n ruptura-system \
              -l job-name=install-ruptura-ctl

      - name: Show deployment status
        run: |
          echo "=== Pods ==="
          kubectl --kubeconfig /tmp/kubeconfig -n ruptura-system get pods -o wide

          echo ""
          echo "=== Services ==="
          kubectl --kubeconfig /tmp/kubeconfig -n ruptura-system get svc

          echo ""
          echo "=== Access URLs ==="
          NODE_IP=$(kubectl --kubeconfig /tmp/kubeconfig get nodes \
            -o jsonpath='{.items[0].status.addresses[?(@.type=="ExternalIP")].address}' 2>/dev/null)
          if [ -z "${NODE_IP}" ]; then
            NODE_IP=$(kubectl --kubeconfig /tmp/kubeconfig get nodes \
              -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}' 2>/dev/null || echo "pending")
          fi
          API_PORT=$(kubectl --kubeconfig /tmp/kubeconfig -n ruptura-system \
            get svc ruptura \
            -o jsonpath='{.spec.ports[?(@.name=="api")].nodePort}' 2>/dev/null || echo "31468")
          UI_PORT=$(kubectl --kubeconfig /tmp/kubeconfig -n ruptura-system \
            get svc ruptura-ui \
            -o jsonpath='{.spec.ports[0].nodePort}' 2>/dev/null || echo "31469")
          echo "API:       http://${NODE_IP}:${API_PORT}/api/v2/health"
          echo "Dashboard: http://${NODE_IP}:${UI_PORT}/"
          echo "CLI:       ruptura-ctl --url http://${NODE_IP}:${API_PORT} status"

      - name: Smoke test — API + UI health check
        run: |
          NODE_IP=$(kubectl --kubeconfig /tmp/kubeconfig get nodes \
            -o jsonpath='{.items[0].status.addresses[?(@.type=="ExternalIP")].address}')
          if [ -z "${NODE_IP}" ]; then
            NODE_IP=$(kubectl --kubeconfig /tmp/kubeconfig get nodes \
              -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
          fi
          API_PORT=$(kubectl --kubeconfig /tmp/kubeconfig -n ruptura-system \
            get svc ruptura \
            -o jsonpath='{.spec.ports[?(@.name=="api")].nodePort}')
          UI_PORT=$(kubectl --kubeconfig /tmp/kubeconfig -n ruptura-system \
            get svc ruptura-ui \
            -o jsonpath='{.spec.ports[0].nodePort}' 2>/dev/null || echo "31469")

          echo "Checking API at http://${NODE_IP}:${API_PORT}/api/v2/health ..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${NODE_IP}:${API_PORT}/api/v2/health" || echo "000")
            echo "API attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && break
            [ "$i" = "10" ] && echo "API health check failed" && exit 1
            sleep 6
          done

          echo "Checking UI at http://${NODE_IP}:${UI_PORT}/ ..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${NODE_IP}:${UI_PORT}/" || echo "000")
            echo "UI attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 6
          done
          echo "UI health check failed after 60s" && exit 1
