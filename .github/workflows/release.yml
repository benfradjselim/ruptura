name: Release ruptura

on:
  push:
    tags:
      - "v6.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build and deploy (e.g. v6.0.0)"
        required: true
        default: "v6.0.0"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ruptura
  HELM_CHART: deploy/helm/ruptura

# ── Permissions ───────────────────────────────────────────────────────────────
# packages: write  → push image + Helm chart to GHCR
# id-token: write  → Cosign OIDC keyless signing
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ── Stage 1–2: Build & test Go binary ─────────────────────────────────────
  ci:
    name: CI — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workdir
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: workdir/go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./...

  # ── Stage 3–4: Build & push Docker image to GHCR ─────────────────────────
  docker:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      image-tag: ${{ steps.resolve-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: resolve-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.resolve-tag.outputs.tag }}
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./workdir
          file: ./workdir/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ── Stage 5: Cosign — keyless OIDC signature ─────────────────────────────
  cosign:
    name: Cosign — Sign Image
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image digest (keyless OIDC)
        run: |
          cosign sign --yes \
            "${{ needs.docker.outputs.image-ref }}@${{ needs.docker.outputs.digest }}"

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ needs.docker.outputs.image-ref }}@${{ needs.docker.outputs.digest }}"

  # ── Stage 6: Helm — lint, package, push to GHCR OCI ─────────────────────
  helm-publish:
    name: Helm — Package & Publish
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Lint chart
        run: helm lint ${{ env.HELM_CHART }}

      - name: Package chart
        run: |
          helm package ${{ env.HELM_CHART }} --destination /tmp/chart
          ls -la /tmp/chart/

      - name: Push chart to GHCR OCI
        run: |
          helm push /tmp/chart/*.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Upload chart as artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: /tmp/chart/*.tgz

  # ── Stage 6.5: Check deploy prerequisites ─────────────────────────────────
  # Sets has_cluster=true only when K3S_KUBECONFIG secret is non-empty.
  # The deploy job is skipped (not failed) when no cluster is configured.
  check-deploy:
    name: Check — deploy prerequisites
    runs-on: ubuntu-latest
    needs: [cosign, helm-publish]
    outputs:
      has_cluster: ${{ steps.check.outputs.has_cluster }}
    steps:
      - name: Detect kubeconfig secret
        id: check
        env:
          KUBECONFIG_B64: ${{ secrets.K3S_KUBECONFIG }}
        run: |
          if [ -n "${KUBECONFIG_B64}" ]; then
            echo "has_cluster=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::K3S_KUBECONFIG not set — deploy will be skipped"
            echo "has_cluster=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Stage 7: Deploy to k3s ─────────────────────────────────────────────────
  # Prerequisites (set in repo Settings → Secrets and variables → Actions):
  #   K3S_KUBECONFIG  : base64 of /etc/rancher/k3s/k3s.yaml with server IP replaced
  #   KAIRO_API_KEY   : (optional) bearer token for the Ruptura API
  #
  # To get K3S_KUBECONFIG from your workspace VM:
  #   sudo cat /etc/rancher/k3s/k3s.yaml \
  #     | sed 's/127.0.0.1/<your-vm-ip>/g' \
  #     | base64 -w0
  # Then paste the output as the K3S_KUBECONFIG secret.
  deploy:
    name: Deploy — k3s
    runs-on: ubuntu-latest
    needs: [check-deploy]
    if: needs.check-deploy.outputs.has_cluster == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        run: |
          echo "${{ secrets.K3S_KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig

      - name: Helm upgrade/install ruptura
        env:
          TAG: ${{ needs.docker.outputs.image-tag }}
          RUPTURA_API_KEY: ${{ secrets.RUPTURA_API_KEY }}
        run: |
          helm upgrade --install ruptura ${{ env.HELM_CHART }} \
            --namespace ruptura \
            --create-namespace \
            --set image.tag="${TAG}" \
            --set apiKey="${RUPTURA_API_KEY}" \
            --set service.type=LoadBalancer \
            --kubeconfig /tmp/kubeconfig \
            --wait \
            --timeout 5m

      - name: Show deployment status
        run: |
          echo "=== Pods ==="
          kubectl --kubeconfig /tmp/kubeconfig -n ruptura get pods -o wide

          echo ""
          echo "=== Service ==="
          kubectl --kubeconfig /tmp/kubeconfig -n ruptura get svc ruptura

          echo ""
          echo "=== External IP / Access ==="
          EXTERNAL_IP=$(kubectl --kubeconfig /tmp/kubeconfig -n ruptura \
            get svc ruptura \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")
          echo "ruptura endpoint: http://${EXTERNAL_IP}/api/v2/health"
          echo "ruptura metrics:  http://${EXTERNAL_IP}:9090/api/v2/metrics"

      - name: Smoke test — health check
        run: |
          EXTERNAL_IP=$(kubectl --kubeconfig /tmp/kubeconfig -n ruptura \
            get svc ruptura \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${EXTERNAL_IP}/api/v2/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 6
          done
          echo "Health check failed after 60s" && exit 1
