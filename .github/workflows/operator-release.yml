name: Operator — Build & Publish

on:
  push:
    tags:
      - "v6.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Operator version tag (e.g. v0.6.8)"
        required: true
        default: "v0.6.9"

env:
  REGISTRY: ghcr.io
  OP_IMAGE: ghcr.io/${{ github.repository_owner }}/ruptura-operator
  BUNDLE_IMAGE: ghcr.io/${{ github.repository_owner }}/ruptura-operator-bundle
  CATALOG_IMAGE: ghcr.io/${{ github.repository_owner }}/ruptura-catalog

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ── Resolve the operator semver from the app tag (v6.6.3 → v0.6.7) ────────
  resolve-version:
    name: Resolve operator version
    runs-on: ubuntu-latest
    outputs:
      op-tag: ${{ steps.resolve.outputs.op-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve operator tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "op-tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # Extract chart version from helm/Chart.yaml as operator version
            OP_VER=$(grep '^version:' helm/Chart.yaml | awk '{print $2}')
            echo "op-tag=v${OP_VER}" >> "$GITHUB_OUTPUT"
          fi

  # ── Build & push the operator binary image ─────────────────────────────────
  operator-image:
    name: Operator image
    runs-on: ubuntu-latest
    needs: resolve-version
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.OP_IMAGE }}
          tags: |
            type=raw,value=${{ needs.resolve-version.outputs.op-tag }}
            type=raw,value=latest

      - name: Build and push operator image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./workdir/operator
          file: ./workdir/operator/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Sign the operator image ────────────────────────────────────────────────
  operator-sign:
    name: Sign operator image
    runs-on: ubuntu-latest
    needs: operator-image
    steps:
      - uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign operator image
        run: |
          cosign sign --yes \
            "${{ env.OP_IMAGE }}@${{ needs.operator-image.outputs.digest }}"

  # ── Build & push OLM bundle image ─────────────────────────────────────────
  bundle-image:
    name: OLM bundle image
    runs-on: ubuntu-latest
    needs: [resolve-version, operator-image]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push bundle image
        uses: docker/build-push-action@v5
        with:
          context: ./bundle
          file: ./bundle/Dockerfile
          push: true
          tags: |
            ${{ env.BUNDLE_IMAGE }}:${{ needs.resolve-version.outputs.op-tag }}
            ${{ env.BUNDLE_IMAGE }}:latest
          platforms: linux/amd64,linux/arm64

  # ── Build & push FBC catalog image ────────────────────────────────────────
  catalog-image:
    name: FBC catalog image
    runs-on: ubuntu-latest
    needs: [resolve-version, bundle-image]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push catalog image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./catalog.Dockerfile
          push: true
          tags: |
            ${{ env.CATALOG_IMAGE }}:${{ needs.resolve-version.outputs.op-tag }}
            ${{ env.CATALOG_IMAGE }}:latest
          platforms: linux/amd64,linux/arm64

  # ── Validate bundle with operator-sdk ─────────────────────────────────────
  bundle-validate:
    name: Validate OLM bundle
    runs-on: ubuntu-latest
    needs: bundle-image
    steps:
      - uses: actions/checkout@v4

      - name: Install operator-sdk
        run: |
          OS=$(uname | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m | sed 's/x86_64/amd64/')
          curl -fsSLo /usr/local/bin/operator-sdk \
            "https://github.com/operator-framework/operator-sdk/releases/download/v1.42.2/operator-sdk_${OS}_${ARCH}"
          chmod +x /usr/local/bin/operator-sdk
          operator-sdk version

      - name: Validate bundle — operatorframework suite
        run: |
          operator-sdk bundle validate ./bundle \
            --select-optional suite=operatorframework \
            --select-optional name=community

      - name: Validate bundle — operatorhub suite
        run: |
          operator-sdk bundle validate ./bundle \
            --select-optional name=operatorhub

      - name: Validate community-operators submission tree
        run: |
          operator-sdk bundle validate ./operators/ruptura-operator/0.6.9 \
            --select-optional suite=operatorframework \
            --select-optional name=community
