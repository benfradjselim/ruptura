name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Go: build + test + coverage ───────────────────────────────────────────
  go:
    name: Go — Build, Test & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workdir

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: workdir/go.sum

      - name: Build
        run: go build ./...

      - name: Test with coverage (race detector)
        run: go test -race -count=1 -timeout=180s -coverprofile=coverage.out -covermode=atomic ./...

      - name: go vet
        run: go vet ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./workdir/coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── UI: sync version + build check ────────────────────────────────────────
  ui:
    name: UI — Version sync & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workdir/ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: workdir/ui/package-lock.json

      - name: Sync UI version.json from Go const
        working-directory: workdir
        run: |
          VERSION=$(grep 'const version' cmd/ruptura/main.go | sed 's/.*"\(.*\)".*/\1/')
          echo "{\"version\":\"$VERSION\"}" > ui/public/version.json
          echo "Synced version.json to $VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Build Svelte app
        run: npm run build

  # ── Docker: build only (no push) ──────────────────────────────────────────
  docker-lint:
    name: Docker — Build check
    runs-on: ubuntu-latest
    needs: go

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./workdir
          file: ./workdir/Dockerfile
          push: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Helm: lint ────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm — Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint helm/

  # ── Docs: build check ─────────────────────────────────────────────────────
  docs-lint:
    name: Docs — MkDocs build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r site/requirements.txt

      - name: Build site (strict mode)
        run: cd site && mkdocs build --strict

  # ── Docs: env-var drift guard ──────────────────────────────────────────────
  docs-drift:
    name: Docs — env drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check documented env vars exist in code
        run: bash scripts/check-docs-env.sh
