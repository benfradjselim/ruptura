name: CI

on:
  push:
    branches: ["v6.1", "main"]
  pull_request:
    branches: ["v6.1", "main"]

jobs:
  # ── Go: build + test ──────────────────────────────────────────────────────
  go:
    name: Go — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workdir

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: workdir/go.sum

      - name: Build
        run: go build ./...

      - name: Test (race detector)
        run: go test -race -count=1 -timeout=120s ./...

      - name: go vet
        run: go vet ./...

  # ── Docker: build only (no push) ──────────────────────────────────────────
  docker-lint:
    name: Docker — Build check
    runs-on: ubuntu-latest
    needs: go

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./workdir
          file: ./workdir/Dockerfile
          push: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Helm: lint ────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm — Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint helm/

  # ── Docs: build check ─────────────────────────────────────────────────────
  docs-lint:
    name: Docs — MkDocs build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r site/requirements.txt

      - name: Build site (strict mode)
        run: cd site && mkdocs build --strict
