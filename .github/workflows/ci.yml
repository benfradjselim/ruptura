name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  GO_VERSION: "1.22"

jobs:
  test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: workdir

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: workdir/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic -timeout=120s ./... 2>&1 | tee test-output.txt
          go tool cover -func=coverage.out | tail -1

      - name: Coverage gate — per-package ≥60%
        run: |
          # Re-run without -race to get clean per-package coverage percentages.
          # The -race run above caught data races; this run extracts coverage numbers.
          failed=0
          while IFS= read -r line; do
            # Match lines like: ok   github.com/...   0.123s   coverage: 83.1% of statements
            # Also matches cached: ok   github.com/...   (cached)   coverage: 83.1% of statements
            if [[ "$line" =~ ^ok[[:space:]]+(.*)[[:space:]]+([0-9]+\.[0-9]+s|\(cached\))[[:space:]]+coverage:[[:space:]]+([0-9.]+)% ]]; then
              pkg="${BASH_REMATCH[1]}"
              pct="${BASH_REMATCH[3]}"
              # Skip coverage gate for main package and models (too low/difficult to test)
              if [[ "$pkg" == "github.com/benfradjselim/ohe/cmd/ohe" || "$pkg" == "github.com/benfradjselim/ohe/pkg/models" ]]; then
                echo "SKIP: $pkg — ${pct}% (exempt from gate)"
                continue
              fi
              result=$(awk -v p="$pct" 'BEGIN { print (p+0 < 60) ? "fail" : "ok" }')
              if [[ "$result" == "fail" ]]; then
                echo "FAIL: $pkg — ${pct}% (below 60% gate)"
                failed=1
              fi
            fi
          done < <(go test -cover -timeout=120s ./...)
          if [[ "$failed" -eq 1 ]]; then
            exit 1
          fi
          echo "All packages meet ≥60% coverage gate."

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: workdir/coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workdir

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: workdir/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: workdir
          args: --timeout=5m
