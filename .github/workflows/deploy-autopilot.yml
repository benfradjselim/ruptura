name: Deploy Autopilot

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Autopilot image tag (e.g. v7.1.31)"
        required: true
        default: "v7.1.31"
      engine_tag:
        description: "Community engine image tag (e.g. v7.0.34) — updates ruptura-engine in the paid namespace"
        required: true
        default: "v7.0.34"
      namespace:
        description: "Namespace (leave blank to auto-detect)"
        required: false
        default: ""

jobs:
  deploy:
    name: Update paid-edition proxy + engine
    runs-on: ubuntu-latest
    steps:
      - uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        run: |
          echo "${{ secrets.K3S_KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig
          kubectl --kubeconfig /tmp/kubeconfig cluster-info

      - name: Discover namespace
        id: ns
        run: |
          NS="${{ github.event.inputs.namespace }}"
          if [ -z "${NS}" ] || ! kubectl --kubeconfig /tmp/kubeconfig get namespace "${NS}" 2>/dev/null; then
            NS=$(kubectl --kubeconfig /tmp/kubeconfig get deployments -A \
              -o jsonpath='{range .items[*]}{.metadata.namespace}{"\t"}{.metadata.name}{"\n"}{end}' \
              | grep -i autopilot | awk '{print $1}' | head -1)
            echo "Auto-detected namespace: ${NS}"
          fi
          if [ -z "${NS}" ]; then
            echo "ERROR: cannot find autopilot deployment"
            kubectl --kubeconfig /tmp/kubeconfig get deployments -A
            exit 1
          fi
          echo "ns=${NS}" >> "$GITHUB_OUTPUT"
          echo "=== Deployments in ${NS} ==="
          kubectl --kubeconfig /tmp/kubeconfig get deployments -n "${NS}"

      - name: Update autopilot proxy image
        run: |
          NS="${{ steps.ns.outputs.ns }}"
          IMAGE="ghcr.io/benfradjselim/ruptura-autopilot:${{ github.event.inputs.tag }}"
          DEPLOY=$(kubectl --kubeconfig /tmp/kubeconfig get deployments -n "${NS}" \
            -o jsonpath='{.items[*].metadata.name}' | tr ' ' '\n' | grep -i autopilot | head -1)
          CONTAINERS=$(kubectl --kubeconfig /tmp/kubeconfig get deployment "${DEPLOY}" \
            -n "${NS}" -o jsonpath='{.spec.template.spec.containers[*].name}')
          ARGS=""; for c in ${CONTAINERS}; do ARGS="${ARGS} ${c}=${IMAGE}"; done
          echo "Setting ${DEPLOY} → ${IMAGE}"
          kubectl --kubeconfig /tmp/kubeconfig set image deployment/"${DEPLOY}" ${ARGS} -n "${NS}"
          kubectl --kubeconfig /tmp/kubeconfig rollout status deployment/"${DEPLOY}" -n "${NS}" --timeout=5m

      - name: Update ruptura-engine image
        run: |
          NS="${{ steps.ns.outputs.ns }}"
          ENGINE_IMAGE="ghcr.io/benfradjselim/ruptura:${{ github.event.inputs.engine_tag }}"
          # Find the engine deployment (not autopilot, not ui)
          DEPLOY=$(kubectl --kubeconfig /tmp/kubeconfig get deployments -n "${NS}" \
            -o jsonpath='{.items[*].metadata.name}' | tr ' ' '\n' \
            | grep -iv autopilot | grep -iv "\-ui" | grep -i "engine\|ruptura" | head -1)
          if [ -z "${DEPLOY}" ]; then
            echo "No engine deployment found — skipping"
            exit 0
          fi
          CONTAINERS=$(kubectl --kubeconfig /tmp/kubeconfig get deployment "${DEPLOY}" \
            -n "${NS}" -o jsonpath='{.spec.template.spec.containers[*].name}')
          ARGS=""; for c in ${CONTAINERS}; do ARGS="${ARGS} ${c}=${ENGINE_IMAGE}"; done
          echo "Setting ${DEPLOY} → ${ENGINE_IMAGE}"
          kubectl --kubeconfig /tmp/kubeconfig set image deployment/"${DEPLOY}" ${ARGS} -n "${NS}"
          kubectl --kubeconfig /tmp/kubeconfig rollout status deployment/"${DEPLOY}" -n "${NS}" --timeout=5m

      - name: Show final pod status
        run: |
          NS="${{ steps.ns.outputs.ns }}"
          kubectl --kubeconfig /tmp/kubeconfig get pods -n "${NS}" -o wide
