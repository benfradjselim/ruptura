name: Build and Push MLOps Images v2.0

on:
  push:
    branches: [ "main", "v2.0" ]
    tags: [ "v2.*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [collector, processor, trainer, detector, exporter, dashboard]
    steps:
    - uses: actions/checkout@v4
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build and push ${{ matrix.service }}
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.v2
        build-args: SERVICE=${{ matrix.service }}
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/mlopsv2-${{ matrix.service }}:v2.0
          ${{ secrets.DOCKER_USERNAME }}/mlopsv2-${{ matrix.service }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
