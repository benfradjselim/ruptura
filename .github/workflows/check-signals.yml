name: Check Ruptura signals

on:
  workflow_dispatch:
    inputs:
      node_ip:
        description: "Cluster node IP (e.g. 1.2.3.4)"
        required: true
        default: ""
      api_port:
        description: "API NodePort (default 31468)"
        required: false
        default: "31468"

jobs:
  check:
    name: Query live KPI signals
    runs-on: ubuntu-latest
    env:
      RUPTURA_API_KEY: ${{ secrets.RUPTURA_API_KEY }}
      NODE_IP: ${{ github.event.inputs.node_ip }}
      API_PORT: ${{ github.event.inputs.api_port || '31468' }}
    steps:
      - name: Fleet workloads & KPIs
        run: |
          echo "=== Ruptura health ==="
          curl -sf "http://${NODE_IP}:${API_PORT}/api/v2/health" | python3 -m json.tool

          echo ""
          echo "=== Fleet ==="
          curl -sf -H "Authorization: Bearer ${RUPTURA_API_KEY}" \
            "http://${NODE_IP}:${API_PORT}/api/v2/fleet" | python3 -m json.tool | head -100

          echo ""
          echo "=== Active ruptures ==="
          curl -sf -H "Authorization: Bearer ${RUPTURA_API_KEY}" \
            "http://${NODE_IP}:${API_PORT}/api/v2/ruptures" | python3 -m json.tool | head -80

          echo ""
          echo "=== Engine status ==="
          curl -sf -H "Authorization: Bearer ${RUPTURA_API_KEY}" \
            "http://${NODE_IP}:${API_PORT}/api/v2/engine/status" | python3 -m json.tool
