# Dashboard V2+V3 (port 8501)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: mlops
  labels:
    app: dashboard
    version: v3.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
        version: v3.0
    spec:
      containers:
      - name: dashboard
        image: selimbf/mlopsv3-dashboard:v3.0
        imagePullPolicy: IfNotPresent
        args: ["streamlit", "run", "/app/service/main.py", "--server.port=8501", "--server.address=0.0.0.0"]
        ports:
        - containerPort: 8501
          name: http
        env:
        - name: DASHBOARD_PORT
          value: "8501"
        - name: EXPORTER_URL
          value: "http://exporter:8005"
        - name: METRIC_PREDICTOR_URL
          value: "http://metric-predictor:8008"
        - name: DASHBOARD_REFRESH_SEC
          value: "5"
        - name: ANOMALY_THRESHOLD
          value: "0.7"
        - name: STREAMLIT_SERVER_PORT
          value: "8501"
        - name: STREAMLIT_SERVER_ADDRESS
          value: "0.0.0.0"
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: mlops-data
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: mlops
spec:
  selector:
    app: dashboard
  ports:
  - port: 8501
    targetPort: 8501
    nodePort: 30851
    name: http
  type: NodePort
---
# ============================================================================
# V3 SERVICES
# ============================================================================

# Metric Predictor (port 8008)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metric-predictor
  namespace: mlops
  labels:
    app: metric-predictor
    version: v3.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metric-predictor
  template:
    metadata:
      labels:
        app: metric-predictor
        version: v3.0
    spec:
      containers:
      - name: metric-predictor
        image: selimbf/mlopsv3-metric_predictor:v3.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8008
          name: http
        env:
        - name: METRIC_PREDICTOR_PORT
          value: "8008"
        - name: DB_PATH
          value: "/data/mlops.db"
        - name: LOG_LEVEL
          value: "INFO"
        - name: METRIC_PREDICTION_INTERVAL_SEC
          value: "60"
        - name: METRIC_FORECAST_DAYS
          value: "7"
        - name: METRIC_MIN_HISTORY
          value: "10"
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8008
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8008
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: mlops-data
---
apiVersion: v1
kind: Service
metadata:
  name: metric-predictor
  namespace: mlops
  labels:
    app: metric-predictor
    version: v3.0
spec:
  selector:
    app: metric-predictor
  ports:
  - port: 8008
    targetPort: 8008
    name: http
  type: ClusterIP
