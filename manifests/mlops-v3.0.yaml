apiVersion: v1
kind: Namespace
metadata:
  name: mlops
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlops-data
  namespace: mlops
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
# ============================================================================
# V2 SERVICES
# ============================================================================

# Collector (port 8001)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
  namespace: mlops
  labels:
    app: collector
    version: v2.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collector
  template:
    metadata:
      labels:
        app: collector
        version: v2.0
    spec:
      containers:
      - name: collector
        image: selimbf/mlopsv2-collector:v2.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
          name: http
        env:
        - name: COLLECTOR_PORT
          value: "8001"
        - name: DB_PATH
          value: "/data/mlops.db"
        - name: LOG_LEVEL
          value: "INFO"
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: mlops-data
---
apiVersion: v1
kind: Service
metadata:
  name: collector
  namespace: mlops
spec:
  selector:
    app: collector
  ports:
  - port: 8001
    targetPort: 8001
    name: http
---
