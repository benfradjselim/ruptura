apiVersion: v1
kind: ConfigMap
metadata:
  name: ruptura-ui-nginx
  namespace: ruptura-system
  labels:
    helm.sh/chart: ruptura-1.0.1
    app.kubernetes.io/name: ruptura
    app.kubernetes.io/instance: ruptura
    app.kubernetes.io/version: "7.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: ui
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;

        # Proxy all API calls to the core ruptura engine.
        location /api/ {
            proxy_pass http://ruptura/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # Vite builds with base: '/ui/' so hashed assets are requested as
        # /ui/assets/…  but the Dockerfile copies them to the nginx root.
        # Alias strips the /ui prefix so assets resolve correctly.
        location ^~ /ui/ {
            alias /usr/share/nginx/html/;
        }

        # SPA catch-all: serve index.html for any path not found on disk.
        location / {
            try_files $uri /index.html;
        }
    }
