    matchLabels:
      app.kubernetes.io/name: ruptura
      app.kubernetes.io/instance: ruptura
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ruptura
        app.kubernetes.io/instance: ruptura
    spec:
      serviceAccountName: ruptura
      securityContext:
        fsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: ruptura
          image: docker.io/selimbf/ruptura:v8.2.3
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          args:
            - --port=8080
            - --otlp-port=4317
            - --storage=/var/lib/ruptura/data
            - --api-key=$(RUPTURA_API_KEY)
          ports:
            - name: api
              containerPort: 8080
              protocol: TCP
            - name: otlp
              containerPort: 4317
              protocol: TCP
          env:
            - name: RUPTURA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ruptura-secret
                  key: api-key
            - name: RUPTURA_INGEST_RPS
              value: "1000"
            - name: RUPTURA_EDITION
              value: "community"
            - name: RUPTURA_AUTODISCOVERY
              value: "true"
            - name: GOMEMLIMIT
              value: "400MiB"
          startupProbe:
            httpGet:
              path: /api/v2/health
              port: api
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/v2/health
              port: api
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v2/ready
              port: api
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 2
          resources:
            limits:
              cpu: 1000m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/ruptura/data
