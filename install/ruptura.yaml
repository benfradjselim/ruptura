# Source: ruptura/templates/job-init-apikey.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: ruptura-init-apikey
  namespace: ruptura-system
  labels:
    helm.sh/chart: ruptura-1.0.1
    app.kubernetes.io/name: ruptura
    app.kubernetes.io/instance: ruptura
    app.kubernetes.io/version: "7.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ruptura
        app.kubernetes.io/instance: ruptura
    spec:
      restartPolicy: OnFailure
      serviceAccountName: ruptura-init-apikey
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: init-apikey
          image: "bitnami/kubectl:1.29"
          securityContext:
            allowPrivilegeEscalation: false
            # Not read-only: kubectl writes a discovery cache under $HOME
            # (~/.kube/cache). This Job is short-lived and namespace-scoped,
            # unlike the main Deployment which does run with a read-only root FS.
            capabilities:
              drop: [ALL]
          env:
            - name: SECRET_NAME
              value: ruptura-secret
            - name: NAMESPACE
              value: ruptura-system
            - name: HOME
              value: /tmp
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              if kubectl get secret "$SECRET_NAME" -n "$NAMESPACE" >/dev/null 2>&1; then
                echo "Secret $SECRET_NAME already exists in $NAMESPACE — leaving it as-is."
                exit 0
              fi
              KEY=$(tr -dc 'a-f0-9' </dev/urandom | head -c 64)
              kubectl create secret generic "$SECRET_NAME" -n "$NAMESPACE" --from-literal=api-key="$KEY"
              echo "============================================================"
              echo " Ruptura API key generated for this install:"
              echo ""
              echo "   $KEY"
              echo ""
              echo " Save it now — retrieve it again later with:"
              echo "   kubectl get secret $SECRET_NAME -n $NAMESPACE -o jsonpath='{.data.api-key}' | base64 -d"
              echo "============================================================"
